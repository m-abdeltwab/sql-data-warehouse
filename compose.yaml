services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2025-latest
    container_name: sql_server_container
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "sqlserver@1122330"
    volumes:
      - mssql_data:/var/opt/mssql

volumes:
  mssql_data: